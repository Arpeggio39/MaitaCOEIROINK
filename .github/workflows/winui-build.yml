name: Build WinUI

on:
  push:
    paths:
      - 'windows/**'
      - '.github/workflows/winui-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: windows

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.402'

      - name: Restore
        run: dotnet restore MaitaCOEIROINK.sln

      - name: Build
        shell: pwsh
        run: |
          dotnet build MaitaCOEIROINK.sln -c Release -p:Platform=x64 --verbosity normal 2>&1 | Tee-Object -FilePath build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Show build diagnostics on failure
        if: failure()
        shell: pwsh
        working-directory: windows
        run: |
          if (Test-Path build.log) { Get-Content build.log -Tail 300 }
          $out = "MaitaCOEIROINK/obj/x64/Release/net8.0-windows10.0.19041.0/output.json"
          if (Test-Path $out) {
            $data = Get-Content $out -Raw | ConvertFrom-Json
            if ($data.Errors) { $data.Errors | ConvertTo-Json -Depth 8 }
          } else {
            Write-Host "output.json not found"
          }

      - name: Publish
        run: dotnet publish MaitaCOEIROINK/MaitaCOEIROINK.csproj -c Release -p:Platform=x64 -o ../dist/winui

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MaitaCOEIROINK-WinUI-x64
          path: dist/winui/
