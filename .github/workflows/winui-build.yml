name: Build WinUI

on:
  push:
    paths:
      - 'windows/**'
      - '.github/workflows/winui-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: windows

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore MaitaCOEIROINK.sln

      - name: Build
        run: dotnet build MaitaCOEIROINK.sln -c Release -p:Platform=x64

      - name: Show build diagnostics on failure
        if: failure()
        shell: pwsh
        working-directory: windows
        run: |
          Get-ChildItem -Recurse -Path MaitaCOEIROINK/obj -Filter "output.json" | ForEach-Object {
            Write-Host "=== $($_.FullName) ==="
            Get-Content $_.FullName
          }
          Get-ChildItem -Recurse -Path MaitaCOEIROINK/obj -Filter "*.xaml*" | Select-Object -First 20 | ForEach-Object { Write-Host $_.FullName }

      - name: Publish
        run: dotnet publish MaitaCOEIROINK/MaitaCOEIROINK.csproj -c Release -p:Platform=x64 -o ../dist/winui

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MaitaCOEIROINK-WinUI-x64
          path: dist/winui/
