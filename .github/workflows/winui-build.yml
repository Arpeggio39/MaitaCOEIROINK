name: Build WinUI

on:
  push:
    paths:
      - 'windows/**'
      - '.github/workflows/winui-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: windows

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore MaitaCOEIROINK.sln

      - name: Build
        shell: pwsh
        run: |
          dotnet build MaitaCOEIROINK.sln -c Release -p:Platform=x64 --verbosity normal 2>&1 | Tee-Object -FilePath build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Show build diagnostics on failure
        if: failure()
        shell: pwsh
        working-directory: windows
        run: |
          if (Test-Path build.log) { Get-Content build.log -Tail 300 }
          Get-ChildItem -Recurse -Path MaitaCOEIROINK/obj -Include *.json,*.xml,*.txt -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host "=== $($_.FullName) ==="
            Get-Content $_.FullName -ErrorAction SilentlyContinue | Select-Object -First 120
          }

      - name: Publish
        run: dotnet publish MaitaCOEIROINK/MaitaCOEIROINK.csproj -c Release -p:Platform=x64 -o ../dist/winui

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MaitaCOEIROINK-WinUI-x64
          path: dist/winui/
