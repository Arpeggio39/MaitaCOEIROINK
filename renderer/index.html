<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src http://127.0.0.1:* http://localhost:* https://127.0.0.1:* https://localhost:*; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; media-src blob: 'self'" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>琵音マイタ for COEIROINK</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <header class="sidebar-head">
        <div class="brand">
          <img class="brand-logo" src="portrait.png" width="40" height="40" alt="琵音マイタ" />
          <p class="brand-line"><strong>琵音マイタ</strong><span class="muted brand-for"> for COEIROINK</span></p>
        </div>
      </header>
      <div class="sidebar-toolbar">
        <button type="button" id="btnNewProject" class="btn btn-ghost">＋ 新規プロジェクト</button>
        <button type="button" id="btnDictionary" class="btn btn-ghost btn-ghost-muted">読み上げ辞書</button>
      </div>
      <ul id="projectList" class="project-list" role="listbox" aria-label="プロジェクト一覧"></ul>
      <footer class="sidebar-status" role="status" aria-live="polite">
        <span id="engineDot" class="status-dot" aria-hidden="true"></span>
        <p id="engineStatusText" class="sidebar-status-text muted small">COEIROINK 未接続</p>
      </footer>
    </aside>

    <main class="main">
      <header class="main-head">
        <div class="main-head-left">
          <h1 id="projectTitle" class="project-title" title="クリックしてタイトルを編集">無題</h1>
          <input type="text" id="projectTitleInput" class="project-title-input" hidden spellcheck="false" aria-label="プロジェクト名" />
        </div>
        <div class="main-head-center" aria-hidden="true">
          <canvas id="waveformCanvas" class="waveform-canvas" width="640" height="44"></canvas>
        </div>
        <div class="toolbar">
          <div class="toolbar-buttons">
          <button type="button" id="btnUndo" class="btn btn-tool btn-tool-icon" title="取り消す">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 15 3 9m0 0 6-6M3 9h12a6 6 0 0 1 0 12h-3" />
            </svg>
          </button>
          <button type="button" id="btnRedo" class="btn btn-tool btn-tool-icon" title="やり直す">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 15l6-6m0 0-6-6m6 6H9a6 6 0 0 0 0 12h3" />
            </svg>
          </button>
          <button type="button" id="btnPlay" class="btn btn-tool btn-tool-icon btn-accent" title="再生">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" class="icon-play">
              <path fill-rule="evenodd" d="M4.5 5.653c0-1.427 1.529-2.33 2.779-1.643l11.54 6.347c1.295.712 1.295 2.573 0 3.286L7.28 19.99c-1.25.687-2.779-.217-2.779-1.643V5.653Z" clip-rule="evenodd" />
            </svg>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" class="icon-stop hidden">
              <path fill-rule="evenodd" d="M6 5.25A.75.75 0 0 1 6.75 4.5h10.5a.75.75 0 0 1 .75.75v13.5a.75.75 0 0 1-.75.75H6.75a.75.75 0 0 1-.75-.75V5.25Z" clip-rule="evenodd" />
            </svg>
          </button>
          <button type="button" id="btnExport" class="btn btn-tool btn-tool-icon" title="書き出し（WAV）">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5" />
            </svg>
          </button>
          <label class="sr-only" for="exportSamplingRate">書き出しサンプルレート</label>
          <select id="exportSamplingRate" class="input input-toolbar" title="書き出しサンプルレート">
            <option value="8000">8k</option>
            <option value="11025">11k</option>
            <option value="16000">16k</option>
            <option value="22050">22k</option>
            <option value="24000">24k</option>
            <option value="32000">32k</option>
            <option value="44100" selected>44.1k</option>
            <option value="48000">48k</option>
          </select>
          </div>
        </div>
      </header>

      <div id="workspace" class="workspace">
        <section class="editor-pane">
          <label class="sr-only" for="editor">台本（句読点・スペース・改行で区切って合成します）</label>
          <div id="editorWrap" class="editor-wrap">
            <textarea
              id="editor"
              class="editor"
              placeholder="ここに台本を入力…"
              spellcheck="false"
            ></textarea>
            <div id="segmentMirror" class="segment-mirror" aria-hidden="true"></div>
          </div>

          <div id="intonationDock" class="intonation-dock is-inactive" aria-label="イントネーション調整">
            <header class="intonation-dock-head">
              <button type="button" id="btnRegenerateProsody" class="btn-inline-link small">韻律を再取得</button>
            </header>
            <div id="intonationPanel" class="intonation-panel">
              <div id="intonationLoading" class="intonation-loading" hidden aria-live="polite">
                <span class="intonation-spinner" aria-hidden="true"></span>
                <span class="intonation-loading-text">韻律を取得中…</span>
              </div>
              <div id="intonationContent" class="intonation-content">
                <div id="intonationTextStrip" class="intonation-text-strip" aria-label="読み（ひらがな）"></div>
                <div id="intonationSliderStrip" class="intonation-slider-strip" role="group" aria-label="単語ごとのピッチ"></div>
              </div>
            </div>
          </div>
        </section>

        <aside id="paramPane" class="param-pane is-inactive" aria-label="区切りの音声パラメータ">
            <div class="field">
              <div class="field-row">
                <label for="speedScale">話速</label>
                <span id="speedScaleVal" class="val">1.00</span>
              </div>
              <input type="range" id="speedScale" min="0.5" max="2" step="0.01" value="1" />
            </div>

            <div class="field">
              <div class="field-row">
                <label for="pitchScale">声の高さ</label>
                <span id="pitchScaleVal" class="val">0.00</span>
              </div>
              <input type="range" id="pitchScale" min="-0.15" max="0.15" step="0.01" value="0" />
            </div>

            <div class="field">
              <label for="processingAlgorithm">ピッチ加工</label>
              <select id="processingAlgorithm" class="input">
                <option value="td-psola">TD-PSOLA</option>
                <option value="world">WORLD</option>
                <option value="resampling">リサンプリング</option>
              </select>
            </div>

            <div class="field">
              <div class="field-row">
                <label for="intonationScale">抑揚</label>
                <span id="intonationScaleVal" class="val">1.00</span>
              </div>
              <input type="range" id="intonationScale" min="0" max="2" step="0.01" value="1" />
            </div>

            <div class="field">
              <div class="field-row">
                <label for="volumeScale">音量</label>
                <span id="volumeScaleVal" class="val">1.00</span>
              </div>
              <input type="range" id="volumeScale" min="0" max="2" step="0.01" value="1" />
            </div>

            <div class="field">
              <div class="field-row">
                <label for="prePhonemeLength">開始無音</label>
                <span id="prePhonemeLengthVal" class="val">0.10</span>
              </div>
              <input type="range" id="prePhonemeLength" min="0" max="1" step="0.01" value="0.1" />
            </div>

            <div class="field">
              <div class="field-row">
                <label for="postPhonemeLength">終了無音</label>
                <span id="postPhonemeLengthVal" class="val">0.10</span>
              </div>
              <input type="range" id="postPhonemeLength" min="0" max="1" step="0.01" value="0.1" />
            </div>

            <button type="button" id="btnSegmentParamReset" class="btn btn-sentence-reset">既定値に戻す</button>
        </aside>
      </div>
    </main>
  </div>

  <p id="toast" class="toast" role="status" aria-live="polite" hidden></p>

  <div id="connectPrompt" class="boot-overlay" role="dialog" aria-modal="true" aria-labelledby="connectPromptTitle">
    <div class="boot-overlay-inner">
      <img class="boot-overlay-logo" src="portrait.png" width="64" height="64" alt="" />
      <p id="connectPromptTitle" class="boot-overlay-title">COEIROINK を起動してください</p>
      <p class="connect-prompt-desc muted small">COEIROINK を起動したら、下のボタンを押して接続を確認します。</p>
      <p id="connectPromptFeedback" class="connect-prompt-feedback muted small" aria-live="polite"></p>
      <button type="button" id="btnCoeiroinkStarted" class="btn btn-modal-primary">COEIROINK を起動しました</button>
    </div>
  </div>

  <div id="dictionaryModal" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="dictionaryModalTitle">
    <div class="modal-panel modal-panel-lg">
      <header class="modal-head">
        <h2 id="dictionaryModalTitle" class="modal-title">読み上げ辞書</h2>
        <button type="button" id="btnDictDismiss" class="btn-modal-close" aria-label="閉じる">×</button>
      </header>
      <div class="dict-table-wrap">
        <table class="dict-table">
          <thead>
            <tr>
              <th>単語</th>
              <th>読み（かな）</th>
              <th class="col-accent">アクセント</th>
              <th class="col-mora">モーラ</th>
              <th class="col-del"></th>
            </tr>
          </thead>
          <tbody id="dictionaryRows"></tbody>
        </table>
      </div>
      <div class="modal-actions-between">
        <button type="button" id="btnDictAddRow" class="btn btn-dict-add">＋ 行を追加</button>
        <div class="modal-actions">
          <button type="button" id="btnDictClose" class="btn btn-modal-secondary">閉じる</button>
          <button type="button" id="btnDictApply" class="btn btn-modal-primary">保存</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
